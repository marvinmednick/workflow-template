# aider project configuration
# See AIDER.md for full setup and model selection guide.

# Always read these files for context (but don't edit them)
read:
  - AGENT.md
  - CODING.md

# Don't auto-commit — let the user review changes first
auto-commits: false

# Use diff edit format for all models.
# Modern capable models (GPT-4o, Claude, etc.) use diff by default anyway.
# Without this, aider falls back to whole-edit for unrecognized Azure-hosted models,
# which causes some models to return narrative summaries instead of actual file edits.
edit-format: diff

# Show diffs after each change
show-diffs: true
