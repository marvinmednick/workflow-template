# Implementation tool and model configuration.
# Override with --tool/--model args or IMPLEMENT_TOOL/IMPLEMENT_MODEL env vars.
# Precedence: --tool arg > IMPLEMENT_TOOL env > this file

tool=codex
model=

# Test command — run from the project root
# Examples:
#   npm test -- --watchAll=false
#   npm --prefix client test -- --watchAll=false
#   pytest
#   go test ./...
TEST_CMD=

# Path to the known-failures baseline file
# Default: known-test-failures.txt (project root)
KNOWN_FILE=known-test-failures.txt

# File path pattern used by the aider tool to extract files from specs.
# Backtick-quoted paths in specs matching this pattern are passed to aider.
# Examples:
#   src|migrations
#   client|supabase/migrations
#   app|tests
SPEC_FILE_PATTERN=

# Optional: a representative test file loaded as read-only context for aider sessions.
# Leave blank to disable.
# AIDER_REFERENCE_FILE=
